<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>excabit — explorador gráfico de la cadena de Bitcoin</title>
    <meta
      name="description"
      content="Explorador gráfico y editable de transacciones de Bitcoin: el grafo es la interfaz."
    />
  </head>
  <body>
    <!-- TOP BAR: logo · búsqueda · red · ⌘K · ? · ES/EN (docs/06 §2) -->
    <header id="topbar">
      <span id="logo" aria-label="excabit"><b>ex</b><i>ca</i><b>bit</b></span>

      <div id="searchWrap">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M11 4a7 7 0 1 0 4.2 12.6l4.1 4.1 1.4-1.4-4.1-4.1A7 7 0 0 0 11 4zm0 2a5 5 0 1 1 0 10 5 5 0 0 1 0-10z"
          />
        </svg>
        <label for="search" class="sr-only" data-i18n="search.label">Txid a explorar</label>
        <input
          id="search"
          type="text"
          spellcheck="false"
          autocomplete="off"
          data-i18n-attr="placeholder:search.placeholder"
        />
      </div>
      <button id="searchBtn" type="button" data-i18n="search.button">Buscar</button>

      <label for="network" class="sr-only" data-i18n="network.label">Red</label>
      <select id="network" aria-describedby="statusProvider">
        <option value="mainnet">mainnet</option>
        <option value="testnet">testnet</option>
        <option value="signet">signet</option>
      </select>

      <button id="paletteBtn" class="ghost" type="button" data-action="palette">
        <kbd>Ctrl</kbd><kbd>K</kbd>
      </button>
      <button id="shortcutsBtn" class="ghost icon-only" type="button" data-action="shortcuts">
        ?
      </button>
      <button id="langBtn" class="ghost" type="button" data-action="toggleLanguage">ES</button>
    </header>

    <!-- RF-01: la entrada mal formada se explica junto a la búsqueda, no en un
         toast ni en un popup. El error está aquí y aquí se corrige. -->
    <p id="searchError" role="alert" hidden></p>

    <div id="workspace">
      <!-- TOOLBAR: se rellena desde el registro único de acciones (RF-26) -->
      <nav id="toolbar" aria-label="Herramientas"></nav>

      <main id="canvasArea">
        <!-- role="application": es un lienzo interactivo con sus propios
             gestos y atajos, no un documento que se lea en orden. Sin role, el
             aria-label sobre un div es inválido (axe: aria-prohibited-attr). -->
        <div id="graph" role="application" aria-label="Grafo de la transacción"></div>

        <!-- Estado vacío (docs/06 §6) -->
        <div id="empty">
          <svg viewBox="0 0 120 60" aria-hidden="true">
            <circle cx="18" cy="30" r="7" />
            <circle cx="102" cy="30" r="7" />
            <rect x="48" y="20" width="24" height="20" rx="4" />
            <path d="M25 30h23M72 30h23" />
          </svg>
          <h1 data-i18n="empty.title">Explora una transacción de Bitcoin</h1>
          <p data-i18n="empty.body">Pega un txid o prueba con este ejemplo.</p>
          <button id="exampleBtn" type="button" data-i18n="search.example">Ejemplo</button>
        </div>

        <!-- Controles de zoom (docs/06 §2) -->
        <div id="zoomControls">
          <button id="zoomInBtn" type="button" data-action="zoomIn">+</button>
          <button id="zoomOutBtn" type="button" data-action="zoomOut">−</button>
          <button id="fitBtn" type="button" data-action="fit">⤢</button>
        </div>

        <!-- Minimapa (RF-13): posición fija, minimizable -->
        <aside id="minimap">
          <header id="minimapHead">
            <span data-i18n="action.toggleMinimap">Minimapa</span>
            <button id="minimapToggle" type="button" aria-expanded="true">−</button>
          </header>
          <div id="minimapBody"></div>
        </aside>
      </main>

      <!-- PANEL LATERAL: Detalles / Heurísticas / Investigación -->
      <aside id="panel">
        <button id="panelToggle" type="button" data-action="togglePanel" aria-expanded="true">
          ❯
        </button>
        <div id="panelInner">
          <div id="tabs" role="tablist">
            <button
              role="tab"
              id="tabDetails"
              aria-controls="paneDetails"
              aria-selected="true"
              data-i18n="panel.details"
            >
              Detalles
            </button>
            <button
              role="tab"
              id="tabHeuristics"
              aria-controls="paneHeuristics"
              aria-selected="false"
              data-i18n="panel.heuristics"
            >
              Heurísticas
            </button>
            <button
              role="tab"
              id="tabInvestigation"
              aria-controls="paneInvestigation"
              aria-selected="false"
              data-i18n="panel.investigation"
            >
              Investigación
            </button>
          </div>
          <div id="paneDetails" role="tabpanel" aria-labelledby="tabDetails"></div>
          <div id="paneHeuristics" role="tabpanel" aria-labelledby="tabHeuristics" hidden></div>
          <div
            id="paneInvestigation"
            role="tabpanel"
            aria-labelledby="tabInvestigation"
            hidden
          ></div>
        </div>
      </aside>
    </div>

    <!-- STATUS BAR (docs/06 §2) -->
    <footer id="statusbar">
      <span id="statusCounts"></span>
      <span id="statusProvider"><i class="dot"></i>mempool.space</span>
      <span id="statusMessage" role="status" aria-live="polite"></span>
      <!-- Cuántos nodos hay plegados (RF-36.4): plegar no es esconder. -->
      <span id="statusFold" role="status" aria-live="polite"></span>
      <span class="spacer"></span>
      <span id="statusZoom"></span>
      <span id="statusNetwork">mainnet</span>
    </footer>

    <div id="toasts" aria-live="assertive"></div>
    <div id="overlays"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
