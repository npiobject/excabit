name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Formato
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests + cobertura (core/+data/ ≥ 90 %, analysis/ ≥ 95 %)
        run: npm run test:coverage

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      # Contra el build real, con la red mockeada: los E2E no tocan
      # mempool.space (ADR-002).
      - name: E2E (explore, zoom, selection, rendimiento)
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  secrets:
    # BUG-001: el legacy publicó claves NowNodes en el cliente. Que no se repita.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # La historia entera: se escanea todo, no lo que cambió.
          fetch-depth: 0

      # El binario y no `gitleaks-action`, que escanea **el rango de commits del
      # evento**. En el primer push de un repo ese rango no existe (`before` es
      # todo ceros), la acción se queda en «scanned ~0 bytes» y falla — y un gate
      # de seguridad que se cae por culpa del evento que lo dispara, y que además
      # no ha mirado ni un byte, no protege de nada. `gitleaks detect` mira la
      # historia completa siempre, en cada push y da igual de dónde venga.
      - name: Instalar gitleaks
        run: |
          VERSION=8.28.0
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/
          gitleaks version

      # Las claves caducadas del legacy en old/ están en allowlist; una clave
      # nueva en src/ sigue rompiendo el build. Ver .gitleaks.toml.
      # `--redact`: si algún día salta, el secreto no se copia al log público.
      - name: Buscar secretos en toda la historia
        run: gitleaks detect --config .gitleaks.toml --no-banner --redact --verbose
