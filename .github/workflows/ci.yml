name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Formato
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests + cobertura (gate Fase 1 ≥ 90 %)
        run: npm run test:coverage

  secrets:
    # BUG-001: el legacy publicó claves NowNodes en el cliente. Que no se repita.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Las claves caducadas del legacy en old/ están en allowlist; una
          # clave nueva en src/ sigue rompiendo el build. Ver .gitleaks.toml.
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
