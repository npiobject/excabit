name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Formato
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests + cobertura (core/+data/ ≥ 90 %, analysis/ ≥ 95 %)
        run: npm run test:coverage

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      # Contra el build real, con la red mockeada: los E2E no tocan
      # mempool.space (ADR-002).
      - name: E2E (explore, zoom, selection, rendimiento)
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  secrets:
    # BUG-001: el legacy publicó claves NowNodes en el cliente. Que no se repita.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Las claves caducadas del legacy en old/ están en allowlist; una
          # clave nueva en src/ sigue rompiendo el build. Ver .gitleaks.toml.
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
